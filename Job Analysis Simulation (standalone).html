   best:'D',\n        note:'D is strongest. Deepak\\u2019s data decisions govern a regional procurement budget despite no formal authority, so the JAQ should record Decision-Making Autonomy as Fully autonomous with explicit scope of impact (B) — and the gap between informal authority and formal title is a legitimate trigger for title review and regrading (C). Anchoring only on formal authority (A) is precisely the blind spot that under-rewards high-impact individual contributors.' }\n    ]\n  };\n\n  p1Categories = [\n    { key:'coreTasks', label:'Core Tasks', look:'Specific activities performed regularly' },\n    { key:'ksas', label:'Knowledge, Skills & Abilities (KSAs)', look:'Competencies needed or demonstrated' },\n    { key:'conditions', label:'Working Conditions', look:'Environment, hours, physical context' },\n    { key:'informal', label:'Informal / Emergent Tasks', look:'Things done but not formally required', tip:'Does the source reveal any tasks this person performs that fall outside their formal role? These are critical for accurate job analysis — and for compensation, liability, and training decisions.' },\n    { key:'cognitive', label:'Cognitive / Emotional Demands', look:'Mental load, decision pressure, stress' }\n  ];\n\n  benchmarkData = {\n    manju: {\n      title:'Fulfillment Specialist', dept:'Warehouse Operations', reporting:'Floor Manager, Fulfillment', empType:'Permanent / On-Roll',\n      titleKeys:['fulfil','warehouse','picker','specialist','associate'],\n      purpose:'Execute high-volume order fulfilment at the Nelamangala centre — picking, loading and dispatch readiness — while maintaining throughput, accuracy and safety during peak demand cycles.',\n      core:['Load automated picking trolleys and move bulk orders (up to 25 kg) along the conveyor line','Operate the SpeedRun-v2 console and barcode scanning systems to maintain sync','Coordinate packing-line sequencing with floor associates through the shift','Meet productivity and accuracy targets during Big Billion Sale peak periods'],\n      emergent:['Performs unauthorised SpeedRun-v2 console bypass and scanner restarts (3–4×/shift) — emergent; recommend formal training & role review','Escalates high-priority delivery delays to Fleet Dispatch — informal cross-team coordination'],\n      ksa:'10th Pass minimum; manual material handling; basic systems troubleshooting; Kannada/Hindi communication; safety awareness; resilience under peak load.',\n      conditions:'Warehouse / Fulfillment Centre; 10-hour morning shift (6 AM–4 PM); heat/humidity exposure in Zone C with inadequate mitigation (flag for heat-stress policy & equipment audit); noise; physically heavy.',\n      coreCount:4\n    },\n    priya: {\n      title:'Fleet Dispatch Coordinator', dept:'Fleet Operations / Dispatch', reporting:'Hub Operations Manager', empType:'Permanent / On-Roll',\n      titleKeys:['fleet','dispatch','coordinator','logistics','operations'],\n      purpose:'Plan and coordinate intra-city EV and interstate truck dispatch to protect SLAs and minimise vendor penalties, exercising real-time routing and crisis decision-making under operational pressure.',\n      core:['Run the daily vehicle routing matrix (RouteGuru Pro) for 45 EVs and 8 container trucks','Live-track delivery partners and resolve en-route breakdowns and permit delays','Coordinate with roadside assistance, facilities and third-party fleets','Safeguard SLA metrics and minimise vendor penalty exposure (up to ₹1,00,000/day)'],\n      emergent:['Independently rerouted fleet and contracted third-party riders during a charging-dock outage — emergent crisis decision-making & cross-functional KSA; flag pay-equity / regrading review (responsibilities exceed \"Coordinator\")','Manages a strained communication climate with upstream dispatch supervisors — working-condition & interpersonal-skill data point'],\n      ksa:'Graduate (Any); route-optimisation tools; crisis decision-making; cross-functional coordination; stakeholder communication; high stress tolerance.',\n      conditions:'Office / control-room based with field coordination; early shift from 5 AM; high-pressure and time-critical; strained interpersonal climate noted.',\n      coreCount:4\n    },\n    deepak: {\n      title:'Inventory & Demand Analyst', dept:'Supply Chain Analytics', reporting:'Head of Supply Chain Analytics', empType:'Permanent / On-Roll',\n      titleKeys:['inventory','demand','analyst','data','analytics'],\n      purpose:'Forecast inventory demand and optimise stock across South India hubs through advanced data analysis and predictive modelling, translating high-level business goals into executable strategy.',\n      core:['Write SQL queries and build Python data-cleaning pipelines against the ERP (~80% of time)','Design predictive ML models to automate FMCG re-order points','Forecast demand to prevent festive-season stockouts and locked inventory','Present insights to the VP of Operations and regional Hub Heads (~20% of time)'],\n      emergent:['Holds informal authority over the regional procurement budget despite no direct reports — record Decision-Making Autonomy: Fully autonomous with scope of impact; recommend title review / regrading','Documented gap in \"explaining data in simple business terms\" — business communication & data storytelling is an essential KSA for this role'],\n      ksa:'Postgraduate / Graduate (Technical); SQL, Python, ML modelling, ERP analytics; business communication & data storytelling (essential); high cognitive endurance.',\n      conditions:'Corporate HQ, HSR Layout; sedentary; dual-monitor, screen-intensive (entire shift); very high cognitive load; mental fatigue & screen strain noted.',\n      coreCount:4\n    }\n  };\n\n  calc(){\n    const p = this.state.p2, roleKey = this.state.reg.role, b = this.benchmarkData[roleKey] || this.benchmarkData.manju;\n    const filled = p.tasks.filter(t => (t.desc||'').trim());\n    const coreCt = filled.filter(t => t.type==='Core Task').length;\n    const hasEmergentTask = filled.some(t => t.type==='Informal / Emergent Task');\n    const titleMatch = b.titleKeys.some(k => (p.jobTitle||'').toLowerCase().includes(k));\n    const aligned = ['a1','a2'].reduce((n,k,i) => {\n      const ch = (this.challengeData[roleKey]||this.challengeData.manju)[i];\n      return n + (this.state.p3[k]===ch.best ? 1 : 0);\n    }, 0);\n    const physFilled = [p.physEffort, p.standing, p.screenUse, p.cogLoad, (p.lifting.length?'x':'')].filter(Boolean).length;\n    const condFilled = [p.workLocation, (p.envFactors.length?'x':''), p.shiftPattern].filter(Boolean).length;\n    const ksaCt = p.techSkills.length + p.softSkills.length;\n    const pw = this.words(p.purpose);\n    const informalCaptured = hasEmergentTask || (p.specialRemarks||'').trim().length>10 || (this.state.p1.informal||'').trim().length>15;\n\n    const dims = [\n      { dim:'Job Title & Classification', pts: (p.jobTitle.trim() ? (titleMatch?3:2) : 1),\n        commentary: p.jobTitle.trim() ? (titleMatch ? 'Title aligns with the benchmark classification.' : 'Title recorded but diverges from the benchmark designation — check classification.') : 'No job title captured.' },\n      { dim:'Core Task Coverage', pts: (coreCt>=4?3:(coreCt>=2?2:1)),\n        commentary: 'You captured '+coreCt+' core task'+(coreCt===1?'':'s')+'; the benchmark identifies '+b.coreCount+'.' },\n      { dim:'Informal Tasks Documented', pts: (hasEmergentTask?3:(informalCaptured?2:1)),\n        commentary: hasEmergentTask ? 'Emergent task documented in the JAQ — strong practice.' : (informalCaptured ? 'Informal work noted but not formally typed as an emergent task. This omission has pay-equity implications.' : 'The key emergent task (e.g. the IT bypass) was not documented. This omission has pay-equity and liability implications.') },\n      { dim:'KSA Accuracy', pts: ((p.techSkills.length>=2&&p.softSkills.length>=2)?3:(ksaCt>=2?2:1)),\n        commentary: 'Recorded '+p.techSkills.length+' technical and '+p.softSkills.length+' soft skills.' },\n      { dim:'Physical Requirements', pts: (physFilled>=5?3:(physFilled>=3?2:1)),\n        commentary: physFilled>=5?'Physical & cognitive profile fully specified.':'Some physical/cognitive fields left unset.' },\n      { dim:'Working Conditions', pts: (condFilled>=3?3:(condFilled>=2?2:1)),\n        commentary: condFilled>=3?'Working conditions well documented.':'Working-condition detail is thin — environment or shift pattern missing.' },\n      { dim:'Discrepancy Resolutions', pts: (aligned===2?3:(aligned===1?2:1)),\n        commentary: aligned+' of 2 discrepancy resolutions align with the model answer.' },\n      { dim:'JD Completeness & Clarity', pts: (pw>=40?3:(pw>=12?2:1)),\n        commentary: pw>=40?'Purpose statement is clear and complete.':'Job purpose is brief — expand for a review-ready JD.' }\n    ].map(d => ({ ...d, status: d.pts===3?'pass':(d.pts===2?'warn':'fail'),\n      icon: d.pts===3?'✓':(d.pts===2?'!':'✕'),\n      iconStyle:'flex:none;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 13px Inter;color:#fff;background:'+(d.pts===3?'#10B981':(d.pts===2?'#F59E0B':'#EF4444')) }));\n\n    const score = dims.reduce((s,d)=>s+d.pts,0);\n    let band, bandColor;\n    if(score>=21){ band='Distinction — JD meets professional standard'; bandColor='#10B981'; }\n    else if(score>=16){ band='Proficient — minor gaps in coverage or resolution'; bandColor='#1E3A8A'; }\n    else if(score>=10){ band='Developing — key tasks or conditions missed'; bandColor='#F59E0B'; }\n    else { band='Review Required — significant gaps'; bandColor='#EF4444'; }\n    const bandShort = band.split(' — ')[0];\n    return { dims, score, band, bandShort, bandColor };\n  }\n\n  phaseTitles = ['Role Briefing & Method Selection','Source Annotation','JAQ Completion','Discrepancy Resolution','JD Generation','Calibration Panel','Structured Reflection'];\n  phaseShort = ['Briefing','Annotation','JAQ','Discrepancy','JD','Calibration','Reflection'];\n  phaseMins  = [5,10,20,10,3,10,15];\n\n  // ---------- lifecycle ----------\n  componentDidMount(){\n    this._t = setInterval(()=>this.setState({ now: Date.now() }), 1000);\n  }\n  componentWillUnmount(){ clearInterval(this._t); }\n\n  // ---------- helpers ----------\n  setIn(group, key, value){ this.setState(s => ({ [group]: { ...s[group], [key]: value } })); }\n  toggleIn(group, key, value){\n    this.setState(s => {\n      const arr = s[group][key] || [];\n      const has = arr.includes(value);\n      return { [group]: { ...s[group], [key]: has ? arr.filter(x=>x!==value) : [...arr, value] } };\n    });\n  }\n  words(t){ return (t||'').trim() ? (t||'').trim().split(/\\s+/).length : 0; }\n  role(){ return this.roles[this.state.reg.role] || null; }\n\n  goPhase(n){\n    this.setState(s => ({ phase:n, maxPhase: Math.max(s.maxPhase, n) }));\n    if(!this.state.timers[n]) this.setState(s => ({ timers: { ...s.timers, [n]: Date.now() } }));\n  }\n  goNext(){ this.advance(this.state.phase + 1); }\n  advance(n){\n    this.setState(s => ({ phase:n, maxPhase: Math.max(s.maxPhase, n), timers: { ...s.timers, [n]: s.timers[n] || Date.now() } }));\n  }\n\n  begin(){\n    const r = this.state.reg;\n    this.setState({ screen:'sim', leftTab: r.role, phase:0, maxPhase:0, timers:{ 0: Date.now() } });\n  }\n\n  scriptUrl(){\n    const u = (this.props.googleScriptUrl || '').trim();\n    return u;\n  }\n  buildPayload(source){\n    const cal = this.calc();\n    const role = this.roles[this.state.reg.role];\n    return {\n      fullName:this.state.reg.fullName, registerNumber:this.state.reg.registerNumber,\n      programName:this.state.reg.programme,\n      roleSelected:this.state.reg.role, roleTitle: role ? role.title : '',\n      calibrationScore:cal.score, calibrationMax:24, calibrationBand:cal.bandShort,\n      dimensionScores: cal.dims.map(d => d.dim + ': ' + d.pts + '/3').join(' | '),\n      phaseTimestamps:JSON.stringify(this.state.timers),\n      reflectionPrompt1:this.state.p6.r1, reflectionPrompt2:this.state.p6.r2,\n      reflectionPrompt3:this.state.p6.r3 || '',\n      savedVia: source || 'transmit',\n      timestamp:new Date().toISOString()\n    };\n  }\n  async postToSheet(source){\n    const url = this.scriptUrl();\n    const payload = this.buildPayload(source);\n    if(url && url.startsWith('http')){\n      // Apps Script web apps don't return CORS headers; no-cors + form body avoids preflight.\n      const body = new URLSearchParams({ data: JSON.stringify(payload) });\n      await fetch(url, { method:'POST', mode:'no-cors', body });\n    } else {\n      await new Promise(r => setTimeout(r, 1200)); // demo: no endpoint configured\n    }\n  }\n  async transmit(){\n    this.setState({ transmit:'loading' });\n    try { await this.postToSheet('transmit'); this.setState({ transmit:'success' }); }\n    catch(e){ this.setState({ transmit:'error' }); }\n  }\n  async printAndSave(){\n    // Save the performance record on PDF download, then open the print dialog.\n    try { await this.postToSheet('download_pdf'); } catch(e){ /* don't block printing */ }\n    if(this.state.transmit !== 'success') this.setState({ transmit:'success' });\n    window.print();\n  }\n\n  timerInfo(){\n    const ph = this.state.phase;\n    const start = this.state.timers[ph] || this.state.now;\n    const total = (this.phaseMins[ph]||5) * 60;\n    const elapsed = Math.floor((this.state.now - start)/1000);\n    const remain = Math.max(0, total - elapsed);\n    const mm = String(Math.floor(remain/60)).padStart(2,'0');\n    const ss = String(remain%60).padStart(2,'0');\n    const pct = Math.max(0, Math.min(100, (remain/total)*100));\n    return { label: mm+':'+ss, pct, over: remain<=0 };\n  }\n\n  // ---------- registration validity ----------\n  regValid(){\n    const r = this.state.reg;\n    const regNumOk = (this.props.requireRegisterNumber ?? true) ? r.registerNumber.trim().length>=5 : true;\n    return r.fullName.trim().length>=3 && regNumOk && r.programme.trim().length>=1 && !!r.role;\n  }\n\n  // ---------- per-phase advance gates ----------\n  p1Valid(){ return this.p1Categories.every(c => (this.state.p1[c.key]||'').trim().length>=15); }\n\n  cbGroup(key, options){\n    const arr = this.state.p2[key] || [];\n    return options.map(o => ({ label:o, checked:arr.includes(o), onToggle:()=>this.toggleIn('p2',key,o),\n      boxStyle:'display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid '+(arr.includes(o)?'#1E3A8A':'#CBD5E1')+';border-radius:8px;cursor:pointer;background:'+(arr.includes(o)?'#EFF6FF':'#fff')+';font:400 13.5px Inter;color:#1E293B' }));\n  }\n  radioGroup(key, options){\n    const cur = this.state.p2[key];\n    return options.map(o => ({ label:o, value:o, checked:cur===o, onSelect:()=>this.setIn('p2',key,o),\n      boxStyle:'display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid '+(cur===o?'#1E3A8A':'#CBD5E1')+';border-radius:8px;cursor:pointer;background:'+(cur===o?'#EFF6FF':'#fff')+';font:400 13.5px Inter;color:#1E293B' }));\n  }\n  addTask(){ this.setState(s => ({ p2:{ ...s.p2, tasks:[...s.p2.tasks, { desc:'', freq:'Daily', type:'Core Task' }] } })); }\n  setTask(i, field, val){ this.setState(s => { const t=[...s.p2.tasks]; t[i]={ ...t[i], [field]:val }; return { p2:{ ...s.p2, tasks:t } }; }); }\n  removeTask(i){ this.setState(s => ({ p2:{ ...s.p2, tasks: s.p2.tasks.filter((_,j)=>j!==i) } })); }\n  addTag(listKey, draftKey){\n    const val = (this.state.p2[draftKey]||'').trim();\n    if(!val) return;\n    this.setState(s => ({ p2:{ ...s.p2, [listKey]:[...s.p2[listKey], val], [draftKey]:'' } }));\n  }\n  removeTag(listKey, idx){ this.setState(s => ({ p2:{ ...s.p2, [listKey]: s.p2[listKey].filter((_,j)=>j!==idx) } })); }\n\n  p2Valid(){\n    const p = this.state.p2;\n    const taskOk = p.tasks.filter(t => (t.desc||'').trim().length>0).length >= 4;\n    return p.jobTitle.trim() && p.department.trim() && p.reportingTo.trim() && p.purpose.trim().length>=10\n      && taskOk && p.physEffort && p.cogLoad && p.autonomy && p.workLocation;\n  }\n\n  // ---------- render ----------\n  renderVals(){\n    const S = this.state, role = this.role();\n    const v = {};\n\n    v.isRegister = S.screen==='register';\n    v.isSim = S.screen==='sim';\n    v.isSummary = S.screen==='summary';\n    v.isCert = S.screen==='certificate';\n\n    // registration\n    v.regName = S.reg.fullName; v.regNum = S.reg.registerNumber; v.regProg = S.reg.programme; v.regRole = S.reg.role;\n    const regRequired = this.props.requireRegisterNumber ?? true;\n    v.regNumOptionalHint = regRequired ? '' : '— optional';\n    v.regNumPlaceholder = regRequired ? 'e.g. 24MBA1234' : 'e.g. 24MBA1234 (optional)';\n    v.onRegName = e => this.setIn('reg','fullName',e.target.value);\n    v.onRegNum  = e => this.setIn('reg','registerNumber',e.target.value);\n    v.onRegProg = e => this.setIn('reg','programme',e.target.value);\n    v.onRegRole = e => this.setIn('reg','role',e.target.value);\n    v.roleOptions = [\n      { value:'manju', label:'Manju Gowda — Fulfillment Specialist' },\n      { value:'priya', label:'Priya Nair — Fleet Dispatch Coordinator' },\n      { value:'deepak', label:'Deepak Sharma — Inventory & Demand Analyst' }\n    ];\n    const canBegin = this.regValid();\n    v.beginDisabled = !canBegin;\n    v.beginBtnStyle = 'width:100%;padding:13px;border:none;border-radius:10px;font:700 15px Inter;color:#fff;cursor:'+(canBegin?'pointer':'not-allowed')+';background:'+(canBegin?'#1E3A8A':'#94A3B8')+';transition:background .2s';\n    v.onBegin = () => { if(this.regValid()) this.begin(); };\n\n    // role display\n    v.roleName = role ? role.name : '';\n    v.roleTitle = role ? role.title : '';\n    v.roleSourceType = role ? role.sourceType : '';\n\n    // phase tracker\n    v.phase = S.phase;\n    v.phaseTitle = this.phaseTitles[S.phase] || '';\n    v.phaseSteps = this.phaseShort.map((label, i) => {\n      const st = i < S.phase ? 'complete' : (i===S.phase ? 'active' : 'locked');\n      const unlocked = i <= S.maxPhase;\n      const dotBg = st==='complete' ? '#10B981' : (st==='active' ? '#F59E0B' : '#1E293B');\n      const dotFg = st==='locked' ? '#475569' : '#fff';\n      const dotBorder = st==='active' ? '0 0 0 4px rgba(245,158,11,.22)' : 'none';\n      return {\n        label, onClick: () => { if(unlocked) this.goPhase(i); },\n        wrapStyle:'display:flex;flex-direction:column;align-items:center;gap:6px;min-width:88px;flex:1;cursor:'+(unlocked?'pointer':'default')+';opacity:'+(unlocked?1:.55),\n        dotStyle:'width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 13px Inter;background:'+dotBg+';color:'+dotFg+';box-shadow:'+dotBorder,\n        dotLabel: st==='complete' ? '✓' : String(i),\n        labelStyle:'font:'+(st==='active'?'600':'500')+' 11px/1.2 Inter;color:'+(st==='locked'?'#475569':(st==='active'?'#F59E0B':'#CBD5E1'))+';text-align:center'\n      };\n    });\n\n    // resource tabs (left panel)\n    const order = ['manju','priya','deepak'];\n    v.resourceTabs = order.map(k => {\n      const r = this.roles[k], active = S.leftTab===k;\n      return {\n        label: r.tabLabel, who: r.name + (k===S.reg.role ? ' • your role' : ''),\n        onClick: () => this.setState({ leftTab:k }),\n        style:'flex:1;text-align:left;padding:10px 12px;border:none;border-radius:9px 9px 0 0;cursor:pointer;background:'+(active?'#fff':'transparent')+';color:'+(active?'#1E3A8A':'#64748B')+';border-bottom:'+(active?'2px solid #1E3A8A':'2px solid transparent')\n      };\n    });\n    const lt = this.roles[S.leftTab] || role || this.roles.manju;\n    v.activeResourceText = lt ? lt.source : '';\n    v.activeResourceKind = lt ? lt.tabKind : '';\n\n    // timer\n    const ti = this.timerInfo();\n    v.timerLabel = ti.label;\n    v.timerBarStyle = 'height:100%;width:'+ti.pct+'%;background:'+(ti.over?'#EF4444':'#1E3A8A')+';transition:width 1s linear';\n\n    // phase flags\n    v.isP0 = S.phase===0; v.isP1 = S.phase===1; v.isP2 = S.phase===2; v.isP3 = S.phase===3;\n    v.isP4 = S.phase===4; v.isP5 = S.phase===5; v.isP6 = S.phase===6;\n\n    // shared cta style\n    v.ctaStyle = 'padding:12px 22px;border:none;border-radius:10px;font:700 14px Inter;color:#fff;background:#1E3A8A;cursor:pointer';\n    v.goNext = () => this.goNext();\n\n    // ---- PHASE 0 ----\n    v.methodOptions = this.methodList;\n    v.p0Method = S.p0.method; v.onP0Method = e => this.setIn('p0','method',e.target.value);\n    v.p0Just = S.p0.justification; v.onP0Just = e => this.setIn('p0','justification',e.target.value);\n    const wc = this.words(S.p0.justification);\n    v.p0WordCount = wc; v.p0WordColor = wc>=80 ? '#10B981' : '#94A3B8';\n    const p0ok = !!S.p0.method && wc>=80;\n    v.p0SubmitDisabled = !p0ok;\n    v.p0SubmitStyle = 'padding:10px 18px;border:none;border-radius:9px;font:600 13px Inter;color:#fff;cursor:'+(p0ok?'pointer':'not-allowed')+';background:'+(p0ok?'#1E3A8A':'#94A3B8');\n    v.onP0Submit = () => { if(p0ok) this.setIn('p0','submitted',true); };\n    v.p0Submitted = S.p0.submitted;\n    v.methodInsights = [\n      { role:'Manju Gowda (Fulfillment Specialist)', method:'Direct Observation', why:this.methodInsightData.manju },\n      { role:'Priya Nair (Fleet Dispatch Coordinator)', method:'Document & Record Analysis + CIT', why:this.methodInsightData.priya },\n      { role:'Deepak Sharma (Inventory & Demand Analyst)', method:'Structured Interview + Work Samples', why:this.methodInsightData.deepak }\n    ].map((mi,i)=>({ ...mi, boxStyle:'padding:12px 0 14px;border-bottom:'+(i<2?'1px solid #E2E8F0':'none')+';margin-bottom:'+(i<2?'2px':'14px') }));\n\n    // ---- PHASE 1 ----\n    v.p1Rows = this.p1Categories.map(c => {\n      const value = S.p1[c.key] || '';\n      const ok = value.trim().length>=15;\n      return {\n        label:c.label, look:c.look, tip:c.tip || '',\n        value, onChange: e => this.setIn('p1', c.key, e.target.value),\n        count: value.trim().length, countColor: ok ? '#10B981' : '#94A3B8'\n      };\n    });\n    const p1ok = this.p1Valid();\n    v.p1Disabled = !p1ok;\n    v.p1BtnStyle = 'padding:12px 22px;border:none;border-radius:10px;font:700 14px Inter;color:#fff;cursor:'+(p1ok?'pointer':'not-allowed')+';background:'+(p1ok?'#1E3A8A':'#94A3B8');\n    v.onP1Submit = () => { if(this.p1Valid()) this.goNext(); };\n\n    // annotation reference (used in phase 2 reference card)\n    v.annotationRef = this.p1Categories.map(c => ({ label:c.label, value: S.p1[c.key]||'—' }));\n\n    // ---- PHASE 2: JAQ ----\n    const P = S.p2;\n    const tf = (key) => { v['jaq_'+key] = P[key]; v['onJaq_'+key] = e => this.setIn('p2', key, e.target.value); };\n    ['jobTitle','department','reportingTo','purpose','desirable','shiftPattern','healthSafety','specialRemarks'].forEach(tf);\n    v.jaqTimings = this.cbGroup('timings', ['General Shift','Rotational (A/B/C)','Night Shift Only','Flexible / Remote']);\n    v.jaqEmpType = this.cbGroup('empType', ['Permanent / On-Roll','Contractual / Off-Roll','Gig / Platform-based']);\n    v.jaqMinQual = this.cbGroup('minQual', ['10th Pass','12th Pass / Diploma','Graduate (Any)','Graduate (Technical)','Postgraduate','Professional Certification']);\n    v.jaqLifting = this.cbGroup('lifting', ['Not required','Up to 5 kg','Up to 15 kg','Up to 25 kg','Over 25 kg']);\n    v.jaqEnvFactors = this.cbGroup('envFactors', ['Indoor climate-controlled','Outdoor exposure','Heat / humidity','Noise','Dust / fumes','None significant']);\n    v.jaqPhysEffort = this.radioGroup('physEffort', ['Sedentary','Light','Moderate','Heavy']);\n    v.jaqStanding = this.radioGroup('standing', ['Not required','Occasional','Frequent','Entire shift']);\n    v.jaqScreen = this.radioGroup('screenUse', ['None','Occasional','Frequent','Entire shift']);\n    v.jaqCogLoad = this.radioGroup('cogLoad', ['Low','Moderate','High','Very High']);\n    v.jaqAutonomy = this.radioGroup('autonomy', ['Supervised','Semi-autonomous','Fully autonomous']);\n    v.jaqWorkLoc = P.workLocation; v.onJaqWorkLoc = e => this.setIn('p2','workLocation',e.target.value);\n    v.jaqWorkLocOptions = ['Office / Headquarters','Warehouse / Fulfillment Centre','Field / On-road','Remote / WFH Hybrid'];\n    // tasks\n    v.jaqFreqOptions = ['Daily','Weekly','As Required','Situational'];\n    v.jaqTypeOptions = ['Core Task','Peripheral Task','Informal / Emergent Task'];\n    v.jaqTasks = P.tasks.map((t, i) => ({\n      idx:i, num:i+1, desc:t.desc, freq:t.freq, type:t.type,\n      onDesc: e => this.setTask(i,'desc',e.target.value),\n      onFreq: e => this.setTask(i,'freq',e.target.value),\n      onType: e => this.setTask(i,'type',e.target.value),\n      onRemove: () => this.removeTask(i)\n    }));\n    const taskFilled = P.tasks.filter(t => (t.desc||'').trim()).length;\n    v.jaqTaskCount = taskFilled;\n    v.jaqTaskCountColor = taskFilled>=4 ? '#10B981' : '#94A3B8';\n    v.onAddTask = () => this.addTask();\n    // tags\n    v.jaqTechTags = P.techSkills.map((t,i)=>({ label:t, onRemove:()=>this.removeTag('techSkills',i) }));\n    v.jaqSoftTags = P.softSkills.map((t,i)=>({ label:t, onRemove:()=>this.removeTag('softSkills',i) }));\n    v.jaqTechDraft = P.techDraft; v.onJaqTechDraft = e => this.setIn('p2','techDraft',e.target.value);\n    v.jaqSoftDraft = P.softDraft; v.onJaqSoftDraft = e => this.setIn('p2','softDraft',e.target.value);\n    v.onAddTech = () => this.addTag('techSkills','techDraft');\n    v.onAddSoft = () => this.addTag('softSkills','softDraft');\n    v.onTechKey = e => { if(e.key==='Enter'){ e.preventDefault(); this.addTag('techSkills','techDraft'); } };\n    v.onSoftKey = e => { if(e.key==='Enter'){ e.preventDefault(); this.addTag('softSkills','softDraft'); } };\n    const p2ok = this.p2Valid();\n    v.p2Disabled = !p2ok;\n    v.p2BtnStyle = 'padding:12px 24px;border:none;border-radius:10px;font:700 14px Inter;color:#fff;cursor:'+(p2ok?'pointer':'not-allowed')+';background:'+(p2ok?'#1E3A8A':'#94A3B8');\n    v.onP2Submit = () => { if(this.p2Valid()) this.goNext(); };\n\n    // ---- PHASE 3: Discrepancy ----\n    const ch = (this.challengeData[S.reg.role] || this.challengeData.manju);\n    const subKeys = ['sub1','sub2'], ansKeys = ['a1','a2'];\n    v.p3Challenges = ch.map((c, i) => {\n      const ans = S.p3[ansKeys[i]];\n      const submitted = S.p3[subKeys[i]];\n      const bestText = (c.options.find(o=>o.key===c.best)||{}).text || '';\n      return {\n        idx:i, title:c.title, scenario:c.scenario, question:c.question, submitted, notSubmitted: !submitted,\n        options: c.options.map(o => ({\n          key:o.key, text:o.text, checked: ans===o.key,\n          onSelect: () => { if(!submitted) this.setIn('p3', ansKeys[i], o.key); },\n          optStyle:'display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border:1px solid '\n            + (submitted ? (o.key===c.best ? '#10B981' : (ans===o.key ? '#F59E0B' : '#E2E8F0')) : (ans===o.key ? '#1E3A8A' : '#CBD5E1'))\n            + ';border-radius:10px;cursor:'+(submitted?'default':'pointer')\n            + ';background:'+(submitted ? (o.key===c.best ? '#ECFDF5' : (ans===o.key ? '#FFFBEB' : '#fff')) : (ans===o.key ? '#EFF6FF' : '#fff'))\n            + ';margin-bottom:9px',\n          badge: submitted ? (o.key===c.best ? 'MODEL ANSWER' : (ans===o.key ? 'YOUR PICK' : '')) : '',\n          badgeStyle:'font:700 9px/1 Inter;letter-spacing:.06em;padding:3px 7px;border-radius:5px;color:#fff;background:'+(o.key===c.best?'#10B981':'#F59E0B'),\n          keyStyle:'flex:none;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font:700 12px Inter;color:'+(submitted&&o.key===c.best?'#fff':(ans===o.key?'#fff':'#64748B'))+';background:'+(submitted&&o.key===c.best?'#10B981':(ans===o.key?'#1E3A8A':'#F1F5F9'))\n        })),\n        note:c.note, bestText,\n        aligned: ans===c.best,\n        onSubmit: () => { if(S.p3[ansKeys[i]]) this.setIn('p3', subKeys[i], true); },\n        submitDisabled: !S.p3[ansKeys[i]],\n        submitStyle:'padding:9px 18px;border:none;border-radius:9px;font:600 13px Inter;color:#fff;cursor:'+(S.p3[ansKeys[i]]?'pointer':'not-allowed')+';background:'+(S.p3[ansKeys[i]]?'#1E3A8A':'#94A3B8'),\n        resultStyle:'margin-top:12px;padding:14px 16px;border-radius:10px;background:'+(ans===c.best?'#ECFDF5':'#FFFBEB')+';border:1px solid '+(ans===c.best?'#A7F3D0':'#FDE68A'),\n        resultTag: ans===c.best ? 'Aligned with professional practice' : 'Consider the model answer below'\n      };\n    });\n    const p3ok = S.p3.sub1 && S.p3.sub2;\n    v.p3Done = p3ok;\n    v.p3CtaDisabled = !p3ok;\n    v.p3CtaStyle = 'padding:12px 24px;border:none;border-radius:10px;font:700 14px Inter;color:#fff;cursor:'+(p3ok?'pointer':'not-allowed')+';background:'+(p3ok?'#1E3A8A':'#94A3B8');\n    v.onP3Continue = () => { if(p3ok) this.goNext(); };\n\n    // ---- PHASE 4: JD ----\n    const today = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });\n    v.jdDate = today;\n    v.jdJobTitle = P.jobTitle || '—';\n    v.jdDept = P.department || '—';\n    v.jdReporting = P.reportingTo || '—';\n    v.jdEmpType = P.empType.length ? P.empType.join(', ') : '—';\n    v.jdWorkLoc = P.workLocation || '—';\n    v.jdPurpose = P.purpose || '—';\n    const typeOrder = { 'Core Task':0, 'Peripheral Task':1, 'Informal / Emergent Task':2 };\n    const filledTasks = P.tasks.filter(t => (t.desc||'').trim());\n    const sortedTasks = [...filledTasks].sort((a,b)=>(typeOrder[a.type]??1)-(typeOrder[b.type]??1));\n    v.jdTasks = sortedTasks.map(t => {\n      const emergent = t.type==='Informal / Emergent Task';\n      return { desc:t.desc, meta:t.freq+' · '+t.type, emergent,\n        dotStyle:'flex:none;width:7px;height:7px;border-radius:50%;margin-top:7px;background:'+(emergent?'#F59E0B':'#1E3A8A') };\n    });\n    v.jdHasEmergent = sortedTasks.some(t=>t.type==='Informal / Emergent Task');\n    v.jdMinQual = P.minQual.length ? P.minQual.join(', ') : '—';\n    v.jdTech = P.techSkills.length ? P.techSkills.join(', ') : '—';\n    v.jdSoft = P.softSkills.length ? P.softSkills.join(', ') : '—';\n    v.jdDesirable = P.desirable || '—';\n    v.jdPhysList = [\n      { k:'Physical Effort', val:P.physEffort||'—' },\n      { k:'Lifting / Carrying', val:P.lifting.length?P.lifting.join(', '):'—' },\n      { k:'Sustained Standing', val:P.standing||'—' },\n      { k:'Screen / Computer Use', val:P.screenUse||'—' },\n      { k:'Cognitive Load', val:P.cogLoad||'—' },\n      { k:'Decision-Making Autonomy', val:P.autonomy||'—' }\n    ];\n    v.jdCondList = [\n      { k:'Work Location', val:P.workLocation||'—' },\n      { k:'Environmental Factors', val:P.envFactors.length?P.envFactors.join(', '):'—' },\n      { k:'Shift Pattern', val:P.shiftPattern||'—' }\n    ];\n    v.jdHealthSafety = P.healthSafety || P.specialRemarks || 'No additional health & safety notes recorded.';\n    v.jdStudent = S.reg.fullName + '  |  ' + S.reg.registerNumber + '  |  ' + today;\n    v.jdMetaRows = [\n      { k:'Job Title', val:v.jdJobTitle }, { k:'Department', val:v.jdDept },\n      { k:'Reporting To', val:v.jdReporting }, { k:'Employment Type', val:v.jdEmpType },\n      { k:'Work Location', val:v.jdWorkLoc }, { k:'Effective Date', val:today }\n    ];\n    v.onP4Continue = () => this.goNext();\n\n    // ---- PHASE 5: Calibration ----\n    const bench = this.benchmarkData[S.reg.role] || this.benchmarkData.manju;\n    const cal = this.calc();\n    v.calDims = cal.dims;\n    v.calScore = cal.score;\n    v.calBand = cal.band;\n    v.calBandShort = cal.bandShort;\n    v.calScoreStyle = 'font:800 44px/1 Inter;color:'+cal.bandColor;\n    v.calBandStyle = 'display:inline-block;margin-top:8px;padding:6px 14px;border-radius:20px;font:700 12.5px Inter;color:#fff;background:'+cal.bandColor;\n    // student compact JD\n    v.calStuTitle = P.jobTitle||'—';\n    v.calStuPurpose = P.purpose||'—';\n    v.calStuTasks = P.tasks.filter(t=>(t.desc||'').trim()).map(t=>({ desc:t.desc, type:t.type, emergent:t.type==='Informal / Emergent Task' }));\n    v.calStuKsa = [P.minQual.join(', '), P.techSkills.join(', '), P.softSkills.join(', ')].filter(x=>x).join(' · ') || '—';\n    v.calStuCond = [P.workLocation, P.shiftPattern, P.envFactors.join(', ')].filter(x=>x).join('; ') || '—';\n    // benchmark compact JD\n    v.calBenTitle = bench.title;\n    v.calBenPurpose = bench.purpose;\n    v.calBenCore = bench.core;\n    v.calBenEmergent = bench.emergent;\n    v.calBenKsa = bench.ksa;\n    v.calBenCond = bench.conditions;\n    v.onP5Continue = () => this.goNext();\n\n    // ---- PHASE 6: Reflection ----\n    const rfields = [\n      { key:'r1', label:'Prompt 1', req:true, prompt:'What was the most significant gap between what this employee formally does and what they actually do? Why does that gap exist — and what are its implications for compensation, training, or legal liability?' },\n      { key:'r2', label:'Prompt 2', req:true, prompt:'If you were the HR Business Partner at GatiVeda and had to use this job analysis to redesign this role\\u2019s compensation structure, what would you prioritise changing — and why?' },\n      { key:'r3', label:'Prompt 3 · Optional', req:false, prompt:'Is there anything the source materials could not tell you — something you would want to observe directly or ask the employee in a follow-up interview?' }\n    ];\n    v.p6Fields = rfields.map(f => {\n      const val = S.p6[f.key] || '';\n      const wc = this.words(val);\n      const ok = !f.req || wc>=100;\n      return { key:f.key, label:f.label, prompt:f.prompt, req:f.req, value:val,\n        onChange: (e => this.setIn('p6', f.key, e.target.value)),\n        wc, target: f.req ? '100' : 'optional',\n        counterColor: f.req ? (wc>=100?'#10B981':'#94A3B8') : '#94A3B8',\n        ok };\n    });\n    const p6ok = this.words(S.p6.r1)>=100 && this.words(S.p6.r2)>=100;\n    v.p6Disabled = !p6ok;\n    v.p6BtnStyle = 'padding:13px 26px;border:none;border-radius:10px;font:700 14px Inter;color:#fff;cursor:'+(p6ok?'pointer':'not-allowed')+';background:'+(p6ok?'#F59E0B':'#94A3B8');\n    v.onP6Finalise = () => { if(p6ok) this.setState({ screen:'summary' }); };\n\n    // ---- SCREEN 3 & 4 data ----\n    v.sumName = S.reg.fullName; v.sumReg = S.reg.registerNumber; v.sumProg = S.reg.programme;\n    v.sumRole = (role ? role.title + ' — ' + role.name : '');\n    v.sumScore = cal.score; v.sumBand = cal.bandShort; v.sumBandFull = cal.band;\n    v.sumScoreStyle = 'font:800 30px/1 Inter;color:'+cal.bandColor;\n    v.sumBandStyle = 'display:inline-block;margin-top:6px;padding:5px 12px;border-radius:18px;font:700 11.5px Inter;color:#fff;background:'+cal.bandColor;\n    const phaseStamps = Object.keys(S.timers).sort((a,b)=>a-b).map(k => ({ phase:'Phase '+k+' — '+this.phaseShort[k], time: new Date(S.timers[k]).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) }));\n    v.sumStamps = phaseStamps;\n    v.sumR1 = (S.p6.r1||'').slice(0,200) + ((S.p6.r1||'').length>200?'…':'');\n    v.sumR2 = (S.p6.r2||'').slice(0,200) + ((S.p6.r2||'').length>200?'…':'');\n    v.transmitIdle = S.transmit==='idle' || S.transmit==='error';\n    v.transmitLoading = S.transmit==='loading';\n    v.transmitDone = S.transmit==='success';\n    v.transmitError = S.transmit==='error';\n    v.onTransmit = () => this.transmit();\n    v.onViewCert = () => this.setState({ screen:'certificate' });\n    v.onBackToReflection = () => this.setState({ screen:'sim', phase:6 });\n    // certificate\n    v.certName = S.reg.fullName; v.certReg = S.reg.registerNumber; v.certProg = S.reg.programme;\n    v.certRole = v.sumRole; v.certScore = cal.score; v.certBand = cal.bandShort; v.certDate = today;\n    v.onPrintCert = () => { this.printAndSave(); };\n    v.onCertBack = () => this.setState({ screen:'summary' });\n\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
