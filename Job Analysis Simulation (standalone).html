document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ansform:translateY(8px)}to{opacity:1;transform:none}}\n  @media print{\n    @page{size:landscape;margin:0}\n    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}\n    .no-print{display:none !important}\n    #certScreen{background:#fff !important;padding:0 !important;min-height:auto !important}\n    #certCard{box-shadow:none !important;max-width:none !important;width:96% !important}\n  }\n  textarea,input,select,button{font-family:Inter,system-ui,sans-serif}\n  textarea:focus,input:focus,select:focus{outline:2px solid #1E3A8A;outline-offset:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:#0F172A;font-family:Inter,system-ui,sans-serif;color:#F1F5F9\">\n\n  <!-- ============ SCREEN 1: REGISTRATION ============ -->\n  <sc-if value=\"{{ isRegister }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(1200px 600px at 50% -10%, #1E3A8A 0%, #0F172A 60%)\">\n      <div style=\"width:100%;max-width:520px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)\">\n        <div style=\"height:6px;background:#1E3A8A\"><\u002Fdiv>\n        <div style=\"padding:36px 38px 34px\">\n          <div style=\"font:500 12px/1 Inter;letter-spacing:.16em;text-transform:uppercase;color:#1E3A8A\">CHRIST (Deemed to be University) · SBM<\u002Fdiv>\n          <h1 style=\"margin:14px 0 6px;font:800 27px/1.15 Inter;color:#0F172A;letter-spacing:-.02em\">Job Analysis Simulation<\u002Fh1>\n          <p style=\"margin:0 0 26px;font:400 15px/1.5 Inter;color:#64748B\">GatiVeda Logistics Pvt. Ltd. — a multi-phase job analysis &amp; compensation exercise.<\u002Fp>\n\n          <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Full Name<\u002Flabel>\n          <input value=\"{{ regName }}\" onchange=\"{{ onRegName }}\" placeholder=\"e.g. Ananya Krishnan\" style=\"width:100%;padding:11px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 15px Inter;color:#1E293B;margin-bottom:18px\">\n\n          <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Register Number <span style=\"text-transform:none;letter-spacing:0;color:#94A3B8;font-weight:400\">{{ regNumOptionalHint }}<\u002Fspan><\u002Flabel>\n          <input value=\"{{ regNum }}\" onchange=\"{{ onRegNum }}\" placeholder=\"{{ regNumPlaceholder }}\" style=\"width:100%;padding:11px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 15px Inter;color:#1E293B;margin-bottom:18px\">\n\n          <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Programme &amp; Trimester<\u002Flabel>\n          <input value=\"{{ regProg }}\" onchange=\"{{ onRegProg }}\" placeholder=\"e.g. MBA Programme – Trimester 2\" style=\"width:100%;padding:11px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 15px Inter;color:#1E293B;margin-bottom:18px\">\n\n          <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Which role will you analyse?<\u002Flabel>\n          <select value=\"{{ regRole }}\" onchange=\"{{ onRegRole }}\" style=\"width:100%;padding:11px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 15px Inter;color:#1E293B;background:#fff;margin-bottom:28px\">\n            <option value=\"\">Select a role…<\u002Foption>\n            <sc-for list=\"{{ roleOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n\n          <button onclick=\"{{ onBegin }}\" disabled=\"{{ beginDisabled }}\" style=\"{{ beginBtnStyle }}\">Begin Simulation →<\u002Fbutton>\n          <div style=\"margin-top:16px;font:400 12px/1.5 Inter;color:#94A3B8\">All entries are cached for this session only. No data leaves your browser until you transmit results.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SCREEN 2: SIMULATION WORKSPACE ============ -->\n  <sc-if value=\"{{ isSim }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;min-height:0\">\n      <!-- top bar -->\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 24px;background:#0F172A;border-bottom:1px solid #1E293B\">\n        <div style=\"display:flex;align-items:center;gap:13px;min-width:0\">\n          <div style=\"width:34px;height:34px;border-radius:8px;background:#1E3A8A;display:flex;align-items:center;justify-content:center;font:800 15px Inter;color:#F59E0B;flex:none\">GV<\u002Fdiv>\n          <div style=\"min-width:0\">\n            <div style=\"font:700 14px/1.2 Inter;color:#F1F5F9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Job Analysis Simulation<\u002Fdiv>\n            <div style=\"font:400 12px/1.3 Inter;color:#64748B\">GatiVeda Logistics Pvt. Ltd.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;flex:none\">\n          <div style=\"font:600 13px/1.2 Inter;color:#F1F5F9\">{{ regName }}<\u002Fdiv>\n          <div style=\"font:400 12px/1.3 Inter;color:#64748B\">{{ roleTitle }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- phase progress tracker -->\n      <div style=\"display:flex;align-items:center;gap:0;padding:14px 24px;background:#111C32;border-bottom:1px solid #1E293B;overflow-x:auto\">\n        <sc-for list=\"{{ phaseSteps }}\" as=\"step\" hint-placeholder-count=\"7\">\n          <div onclick=\"{{ step.onClick }}\" style=\"{{ step.wrapStyle }}\">\n            <div style=\"{{ step.dotStyle }}\">{{ step.dotLabel }}<\u002Fdiv>\n            <div style=\"{{ step.labelStyle }}\">{{ step.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- split workspace -->\n      <div style=\"flex:1;display:flex;min-height:0\">\n        <!-- LEFT: resource viewer 40% -->\n        <div style=\"width:40%;max-width:560px;min-width:300px;display:flex;flex-direction:column;background:#EFF6FF;border-right:1px solid #DBEAFE;min-height:0\">\n          <div style=\"display:flex;gap:4px;padding:10px 10px 0;background:#EFF6FF;border-bottom:1px solid #DBEAFE\">\n            <sc-for list=\"{{ resourceTabs }}\" as=\"tab\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\">\n                <div style=\"font:600 12px/1.2 Inter\">{{ tab.label }}<\u002Fdiv>\n                <div style=\"font:400 11px/1.3 Inter;opacity:.7;margin-top:2px\">{{ tab.who }}<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"padding:14px 6px 6px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px\">\n            <div style=\"font:500 11px/1 Inter;letter-spacing:.1em;text-transform:uppercase;color:#1E3A8A\">{{ activeResourceKind }}<\u002Fdiv>\n            <div style=\"font:400 11px/1 Roboto Mono,monospace;color:#64748B;padding-right:12px\">read-only<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow:auto;padding:4px 18px 22px;min-height:0\">\n            <pre style=\"margin:0;white-space:pre-wrap;word-break:break-word;font:400 13.5px/1.7 Roboto Mono,ui-monospace,monospace;color:#1E293B\">{{ activeResourceText }}<\u002Fpre>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- RIGHT: phase workspace 60% -->\n        <div style=\"flex:1;display:flex;flex-direction:column;background:#F8FAFC;min-height:0\">\n          <!-- phase title + advisory timer -->\n          <div style=\"padding:18px 28px 12px;background:#fff;border-bottom:1px solid #E2E8F0\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n              <div>\n                <div style=\"font:500 11px/1 Inter;letter-spacing:.12em;text-transform:uppercase;color:#F59E0B\">Phase {{ phase }} of 6<\u002Fdiv>\n                <h2 style=\"margin:6px 0 0;font:700 21px/1.2 Inter;color:#0F172A;letter-spacing:-.01em\">{{ phaseTitle }}<\u002Fh2>\n              <\u002Fdiv>\n              <div style=\"font:400 12px/1 Roboto Mono,monospace;color:#64748B\">⏱ {{ timerLabel }} <span style=\"color:#94A3B8\">advisory<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px;height:4px;background:#E2E8F0;border-radius:3px;overflow:hidden\">\n              <div style=\"{{ timerBarStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- phase body -->\n          <div style=\"flex:1;overflow:auto;padding:26px 28px 40px;min-height:0\">\n\n            <!-- ===== PHASE 0 ===== -->\n            <sc-if value=\"{{ isP0 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:820px\">\n                <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:0;overflow:hidden;margin-bottom:22px\">\n                  <div style=\"background:#1E3A8A;padding:14px 20px;font:600 13px/1 Inter;letter-spacing:.04em;color:#EFF6FF\">ROLE CONTEXT BRIEFING<\u002Fdiv>\n                  <div style=\"padding:20px 22px;display:grid;grid-template-columns:150px 1fr;gap:12px 18px;font:400 14px/1.5 Inter;color:#1E293B\">\n                    <div style=\"font:600 12px/1.5 Inter;color:#64748B;text-transform:uppercase;letter-spacing:.05em\">Role<\u002Fdiv><div style=\"font:600 14px Inter\">{{ roleTitle }} — {{ roleName }}<\u002Fdiv>\n                    <div style=\"font:600 12px/1.5 Inter;color:#64748B;text-transform:uppercase;letter-spacing:.05em\">Firm<\u002Fdiv><div>GatiVeda Logistics Pvt. Ltd., HSR Layout, Bengaluru<\u002Fdiv>\n                    <div style=\"font:600 12px/1.5 Inter;color:#64748B;text-transform:uppercase;letter-spacing:.05em\">Source Type<\u002Fdiv><div>{{ roleSourceType }}<\u002Fdiv>\n                    <div style=\"font:600 12px/1.5 Inter;color:#64748B;text-transform:uppercase;letter-spacing:.05em\">Your Task<\u002Fdiv><div>Conduct a job analysis of this role using the source materials provided. Begin by reading the source in the left panel before proceeding.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:22px\">\n                  <h3 style=\"margin:0 0 6px;font:700 16px/1.3 Inter;color:#0F172A\">Method Selection Challenge<\u002Fh3>\n                  <p style=\"margin:0 0 18px;font:400 14px/1.55 Inter;color:#475569\">Before analysing this role, select the job analysis data-collection method that best fits it — and explain your reasoning.<\u002Fp>\n\n                  <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Choose one method<\u002Flabel>\n                  <select value=\"{{ p0Method }}\" onchange=\"{{ onP0Method }}\" style=\"width:100%;padding:11px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 15px Inter;color:#1E293B;background:#fff;margin-bottom:18px\">\n                    <option value=\"\">Select a method…<\u002Foption>\n                    <sc-for list=\"{{ methodOptions }}\" as=\"m\" hint-placeholder-count=\"6\">\n                      <option value=\"{{ m }}\">{{ m }}<\u002Foption>\n                    <\u002Fsc-for>\n                  <\u002Fselect>\n\n                  <label style=\"display:block;font:500 12px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#475569;margin-bottom:7px\">Justify your choice <span style=\"color:#94A3B8;text-transform:none;letter-spacing:0\">— consider the nature of the work, what the data source reveals, and limitations (min 80 words)<\u002Fspan><\u002Flabel>\n                  <textarea value=\"{{ p0Just }}\" onchange=\"{{ onP0Just }}\" rows=\"6\" style=\"width:100%;padding:12px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 14.5px/1.6 Inter;color:#1E293B;resize:vertical\"><\u002Ftextarea>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:8px\">\n                    <div style=\"font:400 12px Roboto Mono,monospace;color:{{ p0WordColor }}\">{{ p0WordCount }} / 80 words<\u002Fdiv>\n                    <button onclick=\"{{ onP0Submit }}\" disabled=\"{{ p0SubmitDisabled }}\" style=\"{{ p0SubmitStyle }}\">Reveal Method Insight<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ p0Submitted }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:22px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden\">\n                    <div style=\"background:#10B981;padding:12px 20px;font:600 13px/1 Inter;color:#fff\">METHOD INSIGHT — RECOMMENDED APPROACH PER ROLE<\u002Fdiv>\n                    <div style=\"padding:20px 22px\">\n                      <sc-for list=\"{{ methodInsights }}\" as=\"mi\" hint-placeholder-count=\"3\">\n                        <div style=\"{{ mi.boxStyle }}\">\n                          <div style=\"font:700 14px/1.3 Inter;color:#0F172A;margin-bottom:3px\">{{ mi.role }} <span style=\"font-weight:500;color:#1E3A8A\">→ {{ mi.method }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"font:400 13.5px/1.6 Inter;color:#475569\">{{ mi.why }}<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                      <div style=\"margin-top:6px;padding:12px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:9px;font:400 13px/1.55 Inter;color:#92400E\">Note: In practice, job analysis rarely relies on a single method. Multi-method triangulation is the professional standard.<\u002Fdiv>\n\n                      <div style=\"margin-top:18px;padding:14px 16px;background:#F1F5F9;border:1px dashed #CBD5E1;border-radius:9px\">\n                        <div style=\"font:600 12px/1 Inter;text-transform:uppercase;letter-spacing:.06em;color:#64748B;margin-bottom:7px\">Your response — {{ p0Method }}<\u002Fdiv>\n                        <div style=\"font:400 13.5px/1.6 Inter;color:#1E293B;white-space:pre-wrap\">{{ p0Just }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"text-align:right;margin-top:18px\">\n                        <button onclick=\"{{ goNext }}\" style=\"{{ ctaStyle }}\">Proceed to Source Annotation →<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 1 ===== -->\n            <sc-if value=\"{{ isP1 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:860px\">\n                <div style=\"background:#EFF6FF;border:1px solid #DBEAFE;border-radius:10px;padding:14px 18px;margin-bottom:20px;font:400 14px/1.55 Inter;color:#1E3A8A\">\n                  Read the source carefully. For each category, extract a direct quote or paraphrase from the source material that gives evidence for it. Be specific — page-padding generalities will not hold up in the calibration phase.\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:14px\">\n                  <sc-for list=\"{{ p1Rows }}\" as=\"row\" hint-placeholder-count=\"5\">\n                    <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:16px 18px\">\n                      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px\">\n                        <div style=\"font:700 14.5px/1.3 Inter;color:#0F172A\">{{ row.label }}<\u002Fdiv>\n                        <sc-if value=\"{{ row.tip }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div title=\"{{ row.tip }}\" style=\"cursor:help;font:700 11px Inter;color:#fff;background:#F59E0B;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center\">?<\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                      <div style=\"font:400 12.5px/1.4 Inter;color:#94A3B8;margin-bottom:9px\">{{ row.look }}<\u002Fdiv>\n                      <textarea value=\"{{ row.value }}\" onchange=\"{{ row.onChange }}\" rows=\"2\" placeholder=\"Evidence from source…\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px/1.55 Inter;color:#1E293B;resize:vertical\"><\u002Ftextarea>\n                      <div style=\"font:400 11px Roboto Mono,monospace;color:{{ row.countColor }};margin-top:5px\">{{ row.count }} chars · min 15<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"text-align:right;margin-top:20px\">\n                  <button onclick=\"{{ onP1Submit }}\" disabled=\"{{ p1Disabled }}\" style=\"{{ p1BtnStyle }}\">Submit &amp; Advance →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 2: JAQ ===== -->\n            <sc-if value=\"{{ isP2 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:880px\">\n                <div style=\"background:#0F172A;border-radius:12px 12px 0 0;padding:18px 22px;color:#F1F5F9\">\n                  <div style=\"font:800 16px/1.2 Inter\">GatiVeda Logistics Pvt. Ltd.<\u002Fdiv>\n                  <div style=\"font:600 13px/1.4 Inter;color:#F59E0B;margin-top:2px\">Job Analysis Questionnaire (JAQ)<\u002Fdiv>\n                  <div style=\"font:400 12.5px/1.5 Inter;color:#94A3B8;margin-top:6px\">Complete using source materials. All entries must be factual and free of personal bias.<\u002Fdiv>\n                <\u002Fdiv>\n\n                <details style=\"background:#EFF6FF;border:1px solid #DBEAFE;border-top:none;padding:0\">\n                  <summary style=\"cursor:pointer;padding:11px 22px;font:600 12px/1 Inter;letter-spacing:.04em;text-transform:uppercase;color:#1E3A8A;list-style:none\">▸ Your Phase 1 annotations (reference)<\u002Fsummary>\n                  <div style=\"padding:4px 22px 16px;display:flex;flex-direction:column;gap:8px\">\n                    <sc-for list=\"{{ annotationRef }}\" as=\"a\" hint-placeholder-count=\"5\">\n                      <div style=\"font:400 13px/1.5 Inter;color:#1E293B\"><span style=\"font-weight:600;color:#1E3A8A\">{{ a.label }}:<\u002Fspan> {{ a.value }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdetails>\n\n                <div style=\"background:#fff;border:1px solid #E2E8F0;border-top:none;border-radius:0 0 12px 12px;padding:24px 22px;display:flex;flex-direction:column;gap:30px\">\n\n                  <!-- Section 1 -->\n                  <div>\n                    <div style=\"font:700 13px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#1E3A8A;padding-bottom:9px;border-bottom:2px solid #EFF6FF;margin-bottom:16px\">Section 1 · Job Identification<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 16px\">\n                      <div>\n                        <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:6px\">Job Title<\u002Flabel>\n                        <input value=\"{{ jaq_jobTitle }}\" onchange=\"{{ onJaq_jobTitle }}\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px Inter;color:#1E293B\">\n                      <\u002Fdiv>\n                      <div>\n                        <l ge=\"{{ t.onFreq }}\" style=\"width:100%;padding:9px 8px;border:1px solid #CBD5E1;border-radius:8px;font:400 13px Inter;color:#1E293B;background:#fff\">\n                            <sc-for list=\"{{ jaqFreqOptions }}\" as=\"f\" hint-placeholder-count=\"4\"><option value=\"{{ f }}\">{{ f }}<\u002Foption><\u002Fsc-for>\n                          <\u002Fselect>\n                          <select value=\"{{ t.type }}\" onchange=\"{{ t.onType }}\" style=\"width:100%;padding:9px 8px;border:1px solid #CBD5E1;border-radius:8px;font:400 13px Inter;color:#1E293B;background:#fff\">\n                            <sc-for list=\"{{ jaqTypeOptions }}\" as=\"ty\" hint-placeholder-count=\"3\"><option value=\"{{ ty }}\">{{ ty }}<\u002Foption><\u002Fsc-for>\n                          <\u002Fselect>\n                          <button onclick=\"{{ t.onRemove }}\" style=\"width:28px;height:28px;border:1px solid #FECACA;background:#FEF2F2;color:#EF4444;border-radius:7px;cursor:pointer;font:700 14px Inter\">×<\u002Fbutton>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ onAddTask }}\" style=\"margin-top:10px;padding:9px 16px;border:1px dashed #1E3A8A;background:#EFF6FF;color:#1E3A8A;border-radius:8px;cursor:pointer;font:600 13px Inter\">+ Add Task<\u002Fbutton>\n                  <\u002Fdiv>\n\n                  <!-- Section 3 -->\n                  <div>\n                    <div style=\"font:700 13px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#1E3A8A;padding-bottom:9px;border-bottom:2px solid #EFF6FF;margin-bottom:16px\">Section 3 · Knowledge, Skills &amp; Abilities<\u002Fdiv>\n                    <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:7px\">Minimum Qualifications<\u002Flabel>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px\">\n                      <sc-for list=\"{{ jaqMinQual }}\" as=\"o\" h     <div><label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:7px\">Cognitive Load<\u002Flabel><div style=\"display:flex;flex-wrap:wrap;gap:8px\"><sc-for list=\"{{ jaqCogLoad }}\" as=\"o\" hint-placeholder-count=\"4\"><label style=\"{{ o.boxStyle }}\"><input type=\"radio\" name=\"cogLoad\" checked=\"{{ o.checked }}\" onchange=\"{{ o.onSelect }}\" style=\"accent-color:#1E3A8A\">{{ o.label }}<\u002Flabel><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n                      <div><label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:7px\">Decision-Making Autonomy<\u002Flabel><div style=\"display:flex;flex-wrap:wrap;gap:8px\"><sc-for list=\"{{ jaqAutonomy }}\" as=\"o\" hint-placeholder-count=\"3\"><label style=\"{{ o.boxStyle }}\"><input type=\"radio\" name=\"autonomy\" checked=\"{{ o.checked }}\" onchange=\"{{ o.onSelect }}\" style=\"accent-color:#1E3A8A\">{{ o.label }}<\u002Flabel><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- Section 5 -->\n                  <div>\n                    <div style=\"font:700 13px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#1E3A8A;padding-bottom:9px;border-bottom:2px solid #EFF6FF;margin-bottom:16px\">Section 5 · Working Conditions<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 16px\">\n                      <div>\n                        <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:6px\">Work Location<\u002Flabel>\n                        <select value=\"{{ jaqWorkLoc }}\" onchange=\"{{ onJaqWorkLoc }}\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px Inter;color:#1E293B;background:#fff\">\n                          <option value=\"\">Select…<\u002Foption>\n                          <sc-for list=\"{{ jaqWorkLocOptions }}\" as=\"w\" hint-placeholder-count=\"4\"><option value=\"{{ w }}\">{{ w }}<\u002Foption><\u002Fsc-for>\n                        <\u002Fselect>\n                      <\u002Fdiv>\n                      <div>\n                        <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:6px\">Shift Pattern<\u002Flabel>\n                        <input value=\"{{ jaq_shiftPattern }}\" onchange=\"{{ onJaq_shiftPattern }}\" placeholder=\"e.g. 10-hour morning shift, 6 AM–4 PM\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px Inter;color:#1E293B\">\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:14px\">\n                      <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:7px\">Environmental Factors<\u002Flabel>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                        <sc-for list=\"{{ jaqEnvFactors }}\" as=\"o\" hint-placeholder-count=\"6\"><label style=\"{{ o.boxStyle }}\"><input type=\"checkbox\" checked=\"{{ o.checked }}\" onchange=\"{{ o.onToggle }}\" style=\"accent-color:#1E3A8A\">{{ o.label }}<\u002Flabel><\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-top:14px\">\n                      <div>\n                        <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:6px\">Health &amp; Safety Considerations<\u002Flabel>\n                        <textarea value=\"{{ jaq_healthSafety }}\" onchange=\"{{ onJaq_healthSafety }}\" rows=\"3\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px/1.5 Inter;color:#1E293B;resize:vertical\"><\u002Ftextarea>\n                      <\u002Fdiv>\n                      <div>\n                        <label style=\"display:block;font:500 12px Inter;color:#475569;margin-bottom:6px\">Special Remarks <span style=\"color:#94A3B8\">(informal tasks, edge cases)<\u002Fspan><\u002Flabel>\n                        <textarea value=\"{{ jaq_specialRemarks }}\" onchange=\"{{ onJaq_specialRemarks }}\" rows=\"3\" style=\"width:100%;padding:10px 12px;border:1px solid #CBD5E1;border-radius:8px;font:400 14px/1.5 Inter;color:#1E293B;resize:vertical\"><\u002Ftextarea>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:14px;border-top:1px solid #E2E8F0;padding-top:18px\">\n                    <div style=\"font:400 12px Inter;color:#94A3B8\">Required: identification, ≥4 tasks, physical effort, cognitive load, autonomy, location<\u002Fdiv>\n                    <button onclick=\"{{ onP2Submit }}\" disabled=\"{{ p2Disabled }}\" style=\"{{ p2BtnStyle }}\">Submit JAQ &amp; Continue →<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 3: Discrepancy ===== -->\n            <sc-if value=\"{{ isP3 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:840px\">\n                <div style=\"background:#FFFBEB;border:1px solid #FDE68A;border-left:4px solid #F59E0B;border-radius:10px;padding:16px 20px;margin-bottom:22px\">\n                  <div style=\"font:700 15px/1.3 Inter;color:#92400E;margin-bottom:6px\">⚠ Discrepancy Alert<\u002Fdiv>\n                  <div style=\"font:400 13.5px/1.6 Inter;color:#78350F\">Your job analysis has surfaced situations where what this employee actually does appears to conflict with what their formal role should require. These are not errors — they are the most important findings in any real job analysis. How you resolve them has implications for pay equity, legal liability, and training design.<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;flex-direction:column;gap:22px\">\n                  <sc-for list=\"{{ p3Challenges }}\" as=\"c\" hint-placeholder-count=\"2\">\n                    <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden\">\n                      <div style=\"padding:16px 20px;border-bottom:1px solid #F1F5F9\">\n                        <div style=\"font:700 14.5px/1.3 Inter;color:#0F172A;margin-bottom:7px\">{{ c.title }}<\u002Fdiv>\n                        <div style=\"font:400 13.5px/1.6 Inter;color:#475569\">{{ c.scenario }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"padding:18px 20px\">\n                        <div style=\"font:600 13.5px/1.4 Inter;color:#1E3A8A;margin-bottom:13px\">{{ c.question }}<\u002Fdiv>\n                        <sc-for list=\"{{ c.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n                          <label style=\"{{ o.optStyle }}\">\n                            <div style=\"{{ o.keyStyle }}\">{{ o.key }}<\u002Fdiv>\n                            <input type=\"radio\" checked=\"{{ o.checked }}\" onchange=\"{{ o.onSelect }}\" style=\"display:none\">\n                            <div style=\"flex:1;font:400 13.5px/1.5 Inter;color:#1E293B\">{{ o.text }}<\u002Fdiv>\n                            <sc-if value=\"{{ o.badge }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ o.badgeStyle }}\">{{ o.badge }}<\u002Fdiv><\u002Fsc-if>\n                          <\u002Flabel>\n                        <\u002Fsc-for>\n\n                        <sc-if value=\"{{ c.submitted }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"{{ c.resultStyle }}\">\n                            <div style=\"font:700 11px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#0F172A;margin-bottom:8px\">Resolution Note · {{ c.resultTag }}<\u002Fdiv>\n                            <div style=\"font:400 13.5px/1.65 Inter;color:#1E293B\">{{ c.note }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                        <sc-if value=\"{{ c.notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n                          <div style=\"text-align:right;margin-top:12px\">\n                            <button onclick=\"{{ c.onSubmit }}\" disabled=\"{{ c.submitDisabled }}\" style=\"{{ c.submitStyle }}\">Submit Answer<\u002Fbutton>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"text-align:right;margin-top:22px\">\n                  <button onclick=\"{{ onP3Continue }}\" disabled=\"{{ p3CtaDisabled }}\" style=\"{{ p3CtaStyle }}\">Apply Resolutions to JD →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 4: JD ===== -->\n            <sc-if value=\"{{ isP4 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:800px\">\n                <div style=\"font:400 13px/1.5 Inter;color:#64748B;margin-bottom:14px\">Your JAQ has been compiled into a formatted corporate Job Description. Review it, then compare against the professional benchmark.<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(15,23,42,.06)\">\n                  <div style=\"height:5px;background:#1E3A8A\"><\u002Fdiv>\n                  <div style=\"padding:26px 30px 30px\">\n                    <div style=\"text-align:center;border-bottom:2px solid #0F172A;padding-bottom:14px;margin-bottom:18px\">\n                      <div style=\"font:800 18px/1.2 Inter;color:#0F172A\">GatiVeda Logistics Pvt. Ltd.<\u002Fdiv>\n                      <div style=\"font:500 13px/1 Inter;letter-spacing:.18em;text-transform:uppercase;color:#F59E0B;margin-top:6px\">Job Description<\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <div style=\"display:grid;grid-template-columns:auto 1fr auto 1fr;gap:9px 16px;margin-bottom:22px\">\n                      <sc-for list=\"{{ jdMetaRows }}\" as=\"m\" hint-placeholder-count=\"6\">\n                        <div style=\"font:600 11.5px/1.4 Inter;text-transform:uppercase;letter-spacing:.04em;color:#94A3B8;white-space:nowrap\">{{ m.k }}<\u002Fdiv>\n                        <div style=\"font:600 13.5px/1.4 Inter;color:#1E293B\">{{ m.val }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin-bottom:8px\">JOB PURPOSE<\u002Fdiv>\n                    <div style=\"font:400 14px/1.6 Inter;color:#1E293B;margin-bottom:22px\">{{ jdPurpose }}<\u002Fdiv>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin-bottom:10px\">KEY RESPONSIBILITIES<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:14px\">\n                      <sc-for list=\"{{ jdTasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n                        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                          <div style=\"{{ t.dotStyle }}\"><\u002Fdiv>\n                          <div style=\"flex:1\">\n                            <div style=\"font:400 14px/1.5 Inter;color:#1E293B\">{{ t.desc }}<sc-if value=\"{{ t.emergent }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#F59E0B;font-weight:700\"> *<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                            <div style=\"font:400 11.5px/1.4 Inter;color:#94A3B8\">{{ t.meta }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ jdHasEmergent }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font:400 12px/1.5 Inter;color:#92400E;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:9px 12px;margin-bottom:22px\">* Task identified through job analysis as emergent — not currently formalised in the employment contract. Recommended for review.<\u002Fdiv>\n                    <\u002Fsc-if>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin:8px 0 10px\">KNOWLEDGE, SKILLS &amp; ABILITIES<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:auto 1fr;gap:7px 14px;margin-bottom:22px;font:400 13.5px/1.5 Inter;color:#1E293B\">\n                      <div style=\"font-weight:600;color:#64748B\">Minimum Qualifications<\u002Fdiv><div>{{ jdMinQual }}<\u002Fdiv>\n                      <div style=\"font-weight:600;color:#64748B\">Essential Technical Skills<\u002Fdiv><div>{{ jdTech }}<\u002Fdiv>\n                      <div style=\"font-weight:600;color:#64748B\">Essential Soft Skills<\u002Fdiv><div>{{ jdSoft }}<\u002Fdiv>\n                      <div style=\"font-weight:600;color:#64748B\">Desirable<\u002Fdiv><div>{{ jdDesirable }}<\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin-bottom:10px\">PHYSICAL &amp; COGNITIVE REQUIREMENTS<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:auto 1fr;gap:7px 14px;margin-bottom:22px;font:400 13.5px/1.5 Inter;color:#1E293B\">\n                      <sc-for list=\"{{ jdPhysList }}\" as=\"r\" hint-placeholder-count=\"6\">\n                        <div style=\"font-weight:600;color:#64748B\">{{ r.k }}<\u002Fdiv><div>{{ r.val }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin-bottom:10px\">WORKING CONDITIONS<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:auto 1fr;gap:7px 14px;margin-bottom:22px;font:400 13.5px/1.5 Inter;color:#1E293B\">\n                      <sc-for list=\"{{ jdCondList }}\" as=\"r\" hint-placeholder-count=\"3\">\n                        <div style=\"font-weight:600;color:#64748B\">{{ r.k }}<\u002Fdiv><div>{{ r.val }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n\n                    <div style=\"font:700 12px/1 Inter;letter-spacing:.06em;color:#1E3A8A;margin-bottom:8px\">HEALTH &amp; SAFETY NOTES<\u002Fdiv>\n                    <div style=\"font:400 13.5px/1.6 Inter;color:#1E293B;margin-bottom:22px\">{{ jdHealthSafety }}<\u002Fdiv>\n\n                    <div style=\"border-top:2px solid #0F172A;padding-top:12px;text-align:center;font:400 11.5px/1.5 Inter;color:#94A3B8\">\n                      Prepared via Job Analysis — GatiVeda Simulation<br>{{ jdStudent }}\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;margin-top:20px\">\n                  <button onclick=\"{{ onP4Continue }}\" style=\"{{ ctaStyle }}\">Compare with Benchmark →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 5: Calibration ===== -->\n            <sc-if value=\"{{ isP5 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:900px\">\n                <div style=\"font:400 13px/1.5 Inter;color:#64748B;margin-bottom:16px\">Your Job Description, side-by-side with the professional benchmark. Divergences are not failures — they show where job analysis adds (or loses) value.<\u002Fdiv>\n\n                <!-- side by side -->\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px\">\n                  <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden\">\n                    <div style=\"background:#1E3A8A;padding:11px 16px;font:600 12px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#fff\">Your JD<\u002Fdiv>\n                    <div style=\"padding:16px 18px;font:400 13px/1.55 Inter;color:#1E293B\">\n                      <div style=\"font:700 14px Inter;color:#0F172A\">{{ calStuTitle }}<\u002Fdiv>\n                      <div style=\"margin:8px 0 12px;color:#475569\">{{ calStuPurpose }}<\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:6px\">Responsibilities<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:5px;margin-bottom:12px\">\n                        <sc-for list=\"{{ calStuTasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n                          <div>• {{ t.desc }}<sc-if value=\"{{ t.emergent }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#F59E0B;font-weight:700\"> *<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:4px\">KSAs<\u002Fdiv>\n                      <div style=\"margin-bottom:12px;color:#475569\">{{ calStuKsa }}<\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:4px\">Conditions<\u002Fdiv>\n                      <div style=\"color:#475569\">{{ calStuCond }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:#fff;border:1px solid #DBEAFE;border-radius:12px;overflow:hidden\">\n                    <div style=\"background:#10B981;padding:11px 16px;font:600 12px/1 Inter;letter-spacing:.05em;text-transform:uppercase;color:#fff\">Benchmark JD<\u002Fdiv>\n                    <div style=\"padding:16px 18px;font:400 13px/1.55 Inter;color:#1E293B\">\n                      <div style=\"font:700 14px Inter;color:#0F172A\">{{ calBenTitle }}<\u002Fdiv>\n                      <div style=\"margin:8px 0 12px;color:#475569\">{{ calBenPurpose }}<\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:6px\">Core Responsibilities<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:5px;margin-bottom:10px\">\n                        <sc-for list=\"{{ calBenCore }}\" as=\"c\" hint-placeholder-count=\"4\"><div>• {{ c }}<\u002Fdiv><\u002Fsc-for>\n                      <\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#F59E0B;margin-bottom:6px\">Emergent / Flagged<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:5px;margin-bottom:12px;color:#92400E\">\n                        <sc-for list=\"{{ calBenEmergent }}\" as=\"e\" hint-placeholder-count=\"2\"><div>* {{ e }}<\u002Fdiv><\u002Fsc-for>\n                      <\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:4px\">KSAs<\u002Fdiv>\n                      <div style=\"margin-bottom:12px;color:#475569\">{{ calBenKsa }}<\u002Fdiv>\n                      <div style=\"font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;margin-bottom:4px\">Conditions<\u002Fdiv>\n                      <div style=\"color:#475569\">{{ calBenCond }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- dimension table -->\n                <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;margin-bottom:22px\">\n                  <div style=\"padding:13px 18px;border-bottom:1px solid #F1F5F9;font:700 13px Inter;letter-spacing:.04em;text-transform:uppercase;color:#1E3A8A\">Divergence Detection · 8 Dimensions<\u002Fdiv>\n                  <sc-for list=\"{{ calDims }}\" as=\"d\" hint-placeholder-count=\"8\">\n                    <div style=\"display:flex;gap:13px;align-items:flex-start;padding:13px 18px;border-bottom:1px solid #F8FAFC\">\n                      <div style=\"{{ d.iconStyle }}\">{{ d.icon }}<\u002Fdiv>\n                      <div style=\"flex:1\">\n                        <div style=\"font:600 13.5px/1.3 Inter;color:#0F172A\">{{ d.dim }}<\u002Fdiv>\n                        <div style=\"font:400 12.5px/1.5 Inter;color:#64748B;margin-top:2px\">{{ d.commentary }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font:700 13px Inter;color:#94A3B8;flex:none\">{{ d.pts }}/3<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <!-- score -->\n                <div style=\"background:#0F172A;border-radius:14px;padding:26px 28px;text-align:center;color:#F1F5F9\">\n                  <div style=\"font:500 11px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#94A3B8\">Calibration Score<\u002Fdiv>\n                  <div style=\"{{ calScoreStyle }}\">{{ calScore }}<span style=\"font:600 22px Inter;color:#64748B\"> / 24<\u002Fspan><\u002Fdiv>\n                  <div style=\"{{ calBandStyle }}\">{{ calBandShort }}<\u002Fdiv>\n                  <div style=\"font:400 13px/1.5 Inter;color:#CBD5E1;margin-top:12px\">{{ calBand }}<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"text-align:right;margin-top:22px\">\n                  <button onclick=\"{{ onP5Continue }}\" style=\"{{ ctaStyle }}\">Proceed to Reflection →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PHASE 6: Reflection ===== -->\n            <sc-if value=\"{{ isP6 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:780px\">\n                <div style=\"font:400 13.5px/1.6 Inter;color:#475569;margin-bottom:20px\">The reflective close. Convert the experience into transferable insight. Prompts 1 and 2 are mandatory (min 100 words each).<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:18px\">\n                  <sc-for list=\"{{ p6Fields }}\" as=\"f\" hint-placeholder-count=\"3\">\n                    <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px 20px\">\n                      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:8px\">\n                        <div style=\"font:700 11px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:#1E3A8A\">{{ f.label }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font:500 14px/1.55 Inter;color:#0F172A;margin-bottom:12px\">{{ f.prompt }}<\u002Fdiv>\n                      <textarea value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" rows=\"5\" placeholder=\"Write your reflection…\" style=\"width:100%;padding:12px 13px;border:1px solid #CBD5E1;border-radius:9px;font:400 14px/1.6 Inter;color:#1E293B;resize:vertical\"><\u002Ftextarea>\n                      <div style=\"font:400 12px Roboto Mono,monospace;color:{{ f.counterColor }};margin-top:7px\">{{ f.wc }} words · {{ f.target }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"text-align:right;margin-top:22px\">\n                  <button onclick=\"{{ onP6Finalise }}\" disabled=\"{{ p6Disabled }}\" style=\"{{ p6BtnStyle }}\">Finalise &amp; Transmit →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!--RIGHT_PANEL_MORE-->\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SCREEN 3: SUMMARY TRANSMISSION ============ -->\n  <sc-if value=\"{{ isSummary }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"no-print\" style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto;background:radial-gradient(1200px 600px at 50% -10%, #1E3A8A 0%, #0F172A 60%)\">\n      <div style=\"width:100%;max-width:640px\">\n        <div style=\"text-align:center;margin-bottom:22px\">\n          <div style=\"font:500 12px/1 Inter;letter-spacing:.16em;text-transform:uppercase;color:#F59E0B\">Summary Transmission<\u002Fdiv>\n          <h1 style=\"margin:10px 0 0;font:800 26px/1.2 Inter;color:#F1F5F9\">Your Job Analysis is Ready<\u002Fh1>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)\">\n          <div style=\"padding:24px 26px;border-bottom:1px solid #EFF6FF;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n            <div>\n              <div style=\"font:700 18px/1.2 Inter;color:#0F172A\">{{ sumName }}<\u002Fdiv>\n              <div style=\"font:400 13px/1.5 Inter;color:#64748B\">{{ sumReg }} · {{ sumProg }}<\u002Fdiv>\n              <div style=\"font:500 13px/1.5 Inter;color:#1E3A8A;margin-top:4px\">{{ sumRole }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right\">\n              <div style=\"font:500 10px/1 Inter;letter-spacing:.1em;text-transform:uppercase;color:#94A3B8\">Calibration<\u002Fdiv>\n              <div style=\"{{ sumScoreStyle }}\">{{ sumScore }}<span style=\"font:600 15px Inter;color:#94A3B8\">/24<\u002Fspan><\u002Fdiv>\n              <div style=\"{{ sumBandStyle }}\">{{ sumBand }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 26px;border-bottom:1px solid #EFF6FF\">\n            <div style=\"font:600 11px/1 Inter;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;margin-bottom:10px\">Phase Completion<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n              <sc-for list=\"{{ sumStamps }}\" as=\"s\" hint-placeholder-count=\"7\">\n                <div style=\"font:400 11.5px/1 Roboto Mono,monospace;color:#475569;background:#F1F5F9;border-radius:6px;padding:6px 9px\">{{ s.phase }} · {{ s.time }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 26px;display:flex;flex-direction:column;gap:14px\">\n            <div>\n              <div style=\"font:600 11px/1 Inter;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;margin-bottom:6px\">Reflection — Formal vs Actual Gap<\u002Fdiv>\n              <div style=\"font:400 13px/1.6 Inter;color:#1E293B\">{{ sumR1 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 11px/1 Inter;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;margin-bottom:6px\">Reflection — Compensation Redesign<\u002Fdiv>\n              <div style=\"font:400 13px/1.6 Inter;color:#1E293B\">{{ sumR2 }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 26px;background:#F8FAFC;border-top:1px solid #EFF6FF;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n            <sc-if value=\"{{ transmitDone }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:600 13px Inter;color:#10B981\">✓ Results transmitted successfully.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ transmitError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:600 13px Inter;color:#EF4444\">Transmission failed — retry.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ transmitIdle }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font:400 12px Inter;color:#94A3B8\">Sends your result record to the course log.<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:10px;align-items:center\">\n              <sc-if value=\"{{ transmitDone }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ onViewCert }}\" style=\"padding:11px 20px;border:none;border-radius:9px;font:700 13px Inter;color:#fff;background:#1E3A8A;cursor:pointer\">View My Certificate →<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ transmitIdle }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ onTransmit }}\" style=\"padding:11px 20px;border:none;border-radius:9px;font:700 13px Inter;color:#fff;background:#F59E0B;cursor:pointer\">Transmit Results<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ transmitLoading }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;inset:0;background:rgba(15,23,42,.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:50\">\n        <div style=\"width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:#F59E0B;border-radius:50%;animation:spin .8s linear infinite\"><\u002Fdiv>\n        <div style=\"font:600 14px Inter;color:#F1F5F9\">Transmitting results…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- ============ SCREEN 4: CERTIFICATE ============ -->\n  <sc-if value=\"{{ isCert }}\" hint-placeholder-val=\"{{ false }}\">\n    <div id=\"certScreen\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:#0F172A\">\n      <div id=\"certCard\" style=\"width:100%;max-width:840px;aspect-ratio:1.414;background:#FBFCFE;border:2px solid #1E3A8A;outline:6px solid #1E3A8A;outline-offset:5px;border-radius:4px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5% 9%;box-shadow:0 24px 70px rgba(0,0,0,.45)\">\n        <div style=\"position:absolute;inset:14px;border:1px solid #C7D2FE;border-radius:3px;pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:absolute;top:-90px;right:-90px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,#EFF6FF 0%,transparent 70%)\"><\u002Fdiv>\n        <div style=\"position:absolute;bottom:-90px;left:-90px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,#FEF3C7 0%,transparent 70%)\"><\u002Fdiv>\n        <div style=\"position:relative;width:50px;height:50px;border-radius:11px;background:#1E3A8A;display:flex;align-items:center;justify-content:center;font:800 20px Inter;color:#F59E0B;margin-bottom:14px\">GV<\u002Fdiv>\n        <div style=\"position:relative;font:500 11px/1 Inter;letter-spacing:.22em;text-transform:uppercase;color:#94A3B8\">CHRIST (Deemed to be University) · SBM<\u002Fdiv>\n        <div style=\"position:relative;font:400 14px/1.4 Inter;color:#475569;margin-top:20px\">This is to certify that<\u002Fdiv>\n        <div style=\"position:relative;font:800 32px/1.1 Inter;color:#0F172A;margin:8px 0 4px;letter-spacing:-.01em\">{{ certName }}<\u002Fdiv>\n        <div style=\"position:relative;font:400 13px/1.4 Inter;color:#64748B\">{{ certReg }} · {{ certProg }}<\u002Fdiv>\n        <div style=\"position:relative;font:400 14px/1.5 Inter;color:#475569;margin-top:16px\">has successfully completed the<\u002Fdiv>\n        <div style=\"position:relative;font:700 19px/1.3 Inter;color:#1E3A8A;margin-top:5px\">Job Analysis Simulation — GatiVeda Logistics Pvt. Ltd.<\u002Fdiv>\n        <div style=\"position:relative;font:500 14px/1.4 Inter;color:#0F172A;margin-top:5px\">{{ certRole }}<\u002Fdiv>\n        <div style=\"position:relative;display:inline-flex;align-items:center;gap:10px;margin-top:18px;padding:8px 18px;background:#0F172A;border-radius:24px;color:#F1F5F9;font:600 14px Inter\">Calibration Score: {{ certScore }}/24 <span style=\"color:#F59E0B\">· {{ certBand }}<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;align-items:flex-end;justify-content:space-between;width:100%;margin-top:26px;padding:0 4%\">\n          <div style=\"text-align:center\">\n            <div style=\"font:400 26px/1 'Brush Script MT',cursive;color:#1E3A8A;transform:rotate(-4deg)\">sathiyaseelan<\u002Fdiv>\n            <div style=\"border-top:1px solid #94A3B8;margin-top:6px;padding-top:5px;font:600 11px/1.4 Inter;color:#0F172A\">Dr. Sathiyaseelan B<\u002Fdiv>\n            <div style=\"font:400 10px/1.4 Inter;color:#64748B\">Professor, MBA Programme · SBM, Christ University<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center\">\n            <div style=\"font:400 13px/1 Roboto Mono,monospace;color:#475569\">{{ certDate }}<\u002Fdiv>\n            <div style=\"border-top:1px solid #94A3B8;margin-top:6px;padding-top:5px;font:600 11px/1.4 Inter;color:#0F172A\">Date of Issue<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"no-print\" style=\"display:flex;gap:12px;margin-top:24px\">\n        <button onclick=\"{{ onCertBack }}\" style=\"padding:11px 20px;border:1px solid #334155;background:transparent;color:#CBD5E1;border-radius:9px;font:600 13px Inter;cursor:pointer\">← Back to Summary<\u002Fbutton>\n        <button onclick=\"{{ onPrintCert }}\" style=\"padding:11px 22px;border:none;background:#F59E0B;color:#0F172A;border-radius:9px;font:700 13px Inter;cursor:pointer\">Print / Save PDF<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!--SCREENS_MORE-->\n\n  <!-- ============ PERSISTENT FOOTER ============ -->\n  <div style=\"flex:none;padding:9px 24px;background:#0B1322;border-top:1px solid #1E293B;text-align:center;font:400 11.5px/1.5 Inter;color:#64748B\">\n    Developed by <span style=\"color:#94A3B8\">Dr. Sathiyaseelan B<\u002Fspan>, Professor, MBA Programme, School of Business and Management, Christ University\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;requireRegisterNumber&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Registration&quot;,&quot;label&quot;:&quot;Require Register Number&quot;},&quot;googleScriptUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Data Logging&quot;,&quot;label&quot;:&quot;Google Apps Script Web App URL&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'register',\n    phase: 0,\n    maxPhase: 0,\n    reg: { fullName:'', registerNumber:'', programme:'', role:'' },\n    leftTab: '',\n    timers: {},\n    now: Date.now(),\n    p0: { method:'', justification:'', submitted:false },\n    p1: { coreTasks:'', ksas:'', conditions:'', informal:'', cognitive:'' },\n    p2: { jobTitle:'', department:'', reportingTo:'', timings:[], empType:[], purpose:'',\n          tasks:[], minQual:[], techSkills:[], softSkills:[], techDraft:'', softDraft:'', desirable:'',\n          physEffort:'', lifting:[], standing:'', screenUse:'', cogLoad:'', autonomy:'',\n          workLocation:'', envFactors:[], shiftPattern:'', healthSafety:'', specialRemarks:'' },\n    p3: { a1:'', a2:'', sub1:false, sub2:false },\n    p5: { score:0, band:'', dims:[], run:false },\n    p6: { r1:'', r2:'', r3:'' },\n    transmit: 'idle'\n  };\n\n  // ---------- static data ----------\n  roles = {\n    manju: {\n      name:'Manju Gowda', title:'Fulfillment Specialist', key:'manju',\n      sourceType:'Interview Transcript', tabLabel:'Interview Transcript', tabKind:'Recorded Interview',\n      source:\n`Role: Fulfillment Specialist | Employee: Manju Gowda\nSource: Recorded interview | Date: October 14, 2026\n\n[00:02:15] Interviewer: Manju, walk me through your typical 10-hour shift at the Nelamangala fulfillment center.\n\n[00:02:30] Manju: Sir, I come in for the morning shift at 6:00 AM. For the first four hours, it is heavy physical work. I am standing near the conveyor belt loading the automated picking trolleys. You have to lift boxes constantly—some are small, but many are bulk orders weighing up to 20–25 kg. During the Big Billion Sale days in October, the pressure is crazy. It gets very hot and stuffy in Zone C near the loading docks. The ceiling fans don't do much, and management only gives us extra water bottles when we complain.\n\n[00:05:40] Interviewer: What happens if the automated sorting machines or scanning systems freeze?\n\n[00:05:55] Manju: That is a daily headache now, sir. We use a software called SpeedRun-v2. Lately, the system hangs and the barcode scanner stops syncing. Technically, as per company policy, I am supposed to raise a ticket with the IT Helpdesk and wait for the floor engineer. But they take 45 minutes to come from the main office. If the line stops, my daily productivity bonus gets cut. So, I learned how to open the terminal box, bypass the console, and restart the scanner myself. I do this 3 or 4 times a shift. Nobody gave me training; I just watched what the engineer did once.\n\n[00:11:10] Interviewer: Who do you talk to most during your shift?\n\n[00:11:22] Manju: Mostly the other floor associates. We speak in Kannada and Hindi to coordinate the packing lines. Sometimes I have to call the Fleet Dispatch office upstairs if a high-priority delivery vehicle is delayed, but those supervisors speak to us very rudely. My Floor Manager only comes twice—once at the start for the morning line-up (huddle) and once at the end to check our target numbers.`\n    },\n    priya: {\n      name:'Priya Nair', title:'Fleet Dispatch Coordinator', key:'priya',\n      sourceType:'Activity Log + WhatsApp Chat', tabLabel:'Activity Log & Chat', tabKind:'Shift Log + Chat',\n      source:\n`Role: Fleet Dispatch Coordinator | Employee: Priya Nair\nSource: Daily log sheets and official WhatsApp group | Date: October 15, 2026\n\n— SELF-REPORTED DAILY LOGBOOK —\n\n05:00 AM – 06:30 AM: Logged in early. Ran the vehicle routing matrix using RouteGuru Pro. Charted optimal delivery paths for 45 intra-city electric delivery vehicles (EVs) and 8 interstate container trucks. Errors here are disastrous—if a truck gets stuck in Bengaluru peak-hour traffic due to a bad routing choice, we miss our SLAs, costing up to ₹1,00,000 in vendor penalties per day.\n\n06:30 AM – 10:00 AM: Live tracking of delivery partners. Handled 3 major issues: one local police check-post delay regarding vehicle permits, and two EV breakdown alerts near Silk Board junction. Had to coordinate with the roadside assistance team and reroute backup riders via the dispatch console. High stress.\n\n— OFFICIAL WHATSAPP GROUP (GatiVeda_Ops_Nelamangala) —\n\nPriya Nair [10:14 AM]: @Hub_Maintenance_Team Why are the EV charging docks in Bay 2 showing offline? The delivery partners are waiting for battery swaps. It's delaying the 10:30 AM delivery wave.\n\nRajesh (Admin/Facilities) [10:16 AM]: Priya, there is a local power outage. The backup generator is running but we can only power Bay 1 right now.\n\nPriya Nair [10:18 AM]: Rajesh, if we miss the 10:30 AM slot, our delivery metrics drop by 5% and customers will start canceling orders. Let's do one thing: divert all high-capacity delivery vans to Bay 1 on priority. I will call the third-party bike fleet to handle the smaller orders so your team gets time to fix Bay 2.\n\nRajesh (Admin/Facilities) [10:22 AM]: Okay, sounds practical. Let me instruct the guards to sort the vehicles at the gate accordingly.`\n    },\n    deepak: {\n      name:'Deepak Sharma', title:'Inventory & Demand Analyst', key:'deepak',\n      sourceType:'Manager Appraisal Notes', tabLabel:'Appraisal Notes', tabKind:'Manager Appraisal',\n      source:\n`Role: Inventory & Demand Analyst | Employee: Deepak Sharma\nSource: Annual Role Review by Head of Supply Chain Analytics | Date: October 16, 2026\n\n— SECTION A: WORKPLACE ENVIRONMENT & STRAIN —\n\nWorkspace: Corporate HQ, HSR Layout. High-end laptop with dual external monitors.\nPhysical Demands: Sedentary. No physical labour.\nMental Demands: Very high cognitive load. Must analyse massive, unstructured data sets daily. Errors in predicting inventory demands can lead to severe festive-season stockouts or crores of rupees locked in unsold inventory. Employee reports heavy mental fatigue and screen strain.\n\n— SECTION B: CORE TASK OBSERVATION SUMMARY —\n\n\"Deepak operates with a high degree of autonomy. I give him high-level business goals (e.g., 'Reduce dead-stock across South India hubs by 6% before Diwali'), and he figures out the execution strategy.\n\nHe spends roughly 80% of his time writing SQL queries, building Python data cleaning pipelines, and pulling data from our ERP system. He is currently designing a predictive machine learning model to automate re-order points for fast-moving consumer goods.\n\nThe remaining 20% is spent on cross-functional alignment. He frequently presents data insights and inventory projections to the VP of Operations and regional Hub Heads. Deepak is highly analytical; however, he sometimes struggles to explain his data in simple business terms during meetings. He does not have any direct reports, but his data decisions dictate our entire regional procurement budget.\"`\n    }\n  };\n\n  methodList = ['Direct Observation','Structured Interview','Diary / Self-Report Log','Critical Incident Technique','Questionnaire / Survey','Document & Record Analysis'];\n\n  methodInsightData = {\n    manju: 'Direct Observation is most reliable here because physical tasks, posture loads, environmental conditions, and informal workarounds (like bypassing IT systems) are not accurately self-reported. The interview transcript is valuable but represents Manju\\u2019s own framing of his work — observation would capture what the interview cannot.',\n    priya: 'Document & Record Analysis combined with Critical Incident Technique. Her logbook and WhatsApp transcripts are naturalistic records of real decisions under pressure. Traditional interviews would reconstruct events; these records are the events themselves.',\n    deepak: 'Structured Interview supplemented by Work Samples. His work is cognitive and largely invisible — you cannot observe SQL query writing the way you observe box-lifting. The manager appraisal provides an external lens, but Deepak\\u2019s own structured interview would surface tacit knowledge.'\n  };\n  methodRecommend = { manju:'Direct Observation', priya:'Document & Record Analysis + CIT', deepak:'Structured Interview + Work Samples' };\n\n  challengeData = {\n    manju: [\n      { title:'Challenge 1 — Informal IT Troubleshooting',\n        scenario:'Manju states he bypasses the SpeedRun-v2 console and restarts the scanner 3–4 times per shift to protect his productivity bonus. No training was provided. This task is not listed in his formal job specification.',\n        question:'How should this appear in Manju\\u2019s job documentation?',\n        options:[\n          {key:'A', text:'Ignore it — it is not an official task'},\n          {key:'B', text:'Add it as an \"Informal/Emergent Task\" with a note recommending formal training and role review'},\n          {key:'C', text:'Add it as a Core Task since he performs it daily'},\n          {key:'D', text:'Flag it as a safety/liability concern only, without including it in the JAQ'}],\n        best:'B',\n        note:'The professionally defensible choice is B. Manju\\u2019s scanner bypass is real, recurring, bonus-driven work performed without training or authorisation. Documenting it as an Informal/Emergent Task — with a recommendation for formal training and role review — makes the hidden labour visible, which matters for pay equity, safety liability (an untrained worker opening a terminal box), and training design. Ignoring it (A) erases real work; calling it a Core Task (C) formalises an unsafe practice without review; flagging safety alone (D) loses the task-documentation trail.' },\n      { title:'Challenge 2 — Extreme Heat Conditions',\n        scenario:'Manju describes Zone C near the loading docks as very hot and stuffy, with inadequate ceiling fans. Management provides extra water only when workers complain.',\n        question:'How should this working condition be documented?',\n        options:[\n          {key:'A', text:'Working Condition — Environmental: Heat/humidity exposure with inadequate mitigation'},\n          {key:'B', text:'Health & Safety Concern: Requires formal heat stress policy and equipment audit'},\n          {key:'C', text:'Both A and B — document as a condition AND flag for corrective action'},\n          {key:'D', text:'Personal perception — insufficient to include in formal documentation'}],\n        best:'C',\n        note:'C is the strongest answer. A condition this material is simultaneously a working condition (environmental heat exposure with inadequate mitigation) AND a health & safety matter requiring a formal heat-stress policy and equipment audit. Recording only one (A or B) leaves the other system blind; dismissing it as \"personal perception\" (D) ignores corroborated, recurring testimony and exposes the firm to occupational-health risk.' }\n    ],\n    priya: [\n      { title:'Challenge 1 — Autonomous Cross-Functional Decisions',\n        scenario:'During the EV charging dock outage, Priya independently rerouted the vehicle fleet and contracted third-party riders — decisions with significant financial and SLA implications. Her title is \"Fleet Dispatch Coordinator,\" not a managerial designation.',\n        question:'How should this decision-making scope be documented?',\n        options:[\n          {key:'A', text:'Ignore — coordinators aren\\u2019t supposed to make strategic decisions'},\n          {key:'B', text:'Document as an emergent KSA: \"Crisis decision-making and cross-functional coordination under operational pressure\"'},\n          {key:'C', text:'Flag it as a pay equity concern — her responsibilities exceed her designation'},\n          {key:'D', text:'Both B and C'}],\n        best:'D',\n        note:'D captures the full picture. Priya\\u2019s outage response was genuine crisis decision-making with financial and SLA stakes — it should be documented as an emergent KSA (B). But documentation alone is insufficient when responsibilities visibly exceed the \"Coordinator\" designation: that is a pay-equity and job-grading flag (C). Recording the KSA without flagging the mismatch (B only) quietly normalises under-classified labour.' },\n      { title:'Challenge 2 — Peer Conflict / Communication Climate',\n        scenario:'Priya notes that supervisors from the Fleet Dispatch office \"speak to us very rudely\" when floor associates call upstairs.',\n        question:'Is interpersonal/communication climate a job analysis data point?',\n        options:[\n          {key:'A', text:'No — job analysis documents tasks and conditions, not relationships'},\n          {key:'B', text:'Yes — working relationships are a legitimate working condition that affects retention and performance'},\n          {key:'C', text:'Only if Priya formally files a complaint'},\n          {key:'D', text:'Yes — and it should be documented under both \"Working Conditions\" and \"Essential Interpersonal Skills Required\"'}],\n        best:'D',\n        note:'D is the most complete. Communication climate is a legitimate working condition affecting retention and performance (B), and the rude treatment also implies that interpersonal/communication skills are genuinely required to do the job — so it belongs under both Working Conditions and Essential Interpersonal Skills (D). Treating relationships as out of scope (A) or gating documentation on a formal complaint (C) suppresses data that job analysis exists to surface.' }\n    ],\n    deepak: [\n      { title:'Challenge 1 — Communication Gap as a Performance Issue',\n        scenario:'The appraisal notes Deepak \"sometimes struggles to explain his data in simple business terms during meetings.\" This is identified as a gap — but it is not listed anywhere as a required skill in a typical analyst JD.',\n        question:'How should this be handled in the JAQ?',\n        options:[\n          {key:'A', text:'Ignore — it is a performance issue, not a job analysis matter'},\n          {key:'B', text:'Add \"Business communication and data storytelling\" as an Essential KSA'},\n          {key:'C', text:'Add it as \"Desirable but not mandatory\"'},\n          {key:'D', text:'Flag for inclusion in the training needs analysis section, not the JAQ'}],\n        best:'B',\n        note:'B is the defensible answer. If a documented performance gap is in \"explaining data in simple business terms,\" then business communication and data storytelling is — empirically — an essential KSA for this role, even if a generic analyst JD omits it. Demoting it to \"desirable\" (C) or routing it only to training (D) understates a competency the role demonstrably requires; ignoring it (A) confuses \"performance issue\" with \"undocumented requirement.\"' },\n      { title:'Challenge 2 — Informal Authority / Shadow Decision-Making',\n        scenario:'Deepak has no direct reports, but his data decisions \"dictate our entire regional procurement budget.\" He holds informal authority over procurement outcomes despite having no formal managerial title.',\n        question:'How does this affect the JAQ?',\n        options:[\n          {key:'A', text:'No change — formal authority is what matters for job documentation'},\n          {key:'B', text:'Document under \"Decision-Making Autonomy: Fully autonomous\" and note scope of impact'},\n          {key:'C', text:'Recommend a formal title review and job regrading'},\n          {key:'D', text:'Both B and C'}],\n
